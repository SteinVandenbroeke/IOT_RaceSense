version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: iot_database
    ports:
      - "5433:5432" # Changed from 5432:5432 to avoid host conflict
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://iot_user:supersecretpassword@db:5432/iot_database
      - CORAL_SECRET_TOKEN=coral_secure_123
    depends_on:
      - db

volumes:
  postgres_data: